# ============================================================
# tmux — canonical configuration
#
# This file is the single source of truth for tmux behavior.
# No plugins. No magic. Explicit, procedural configuration.
# ============================================================


# ------------------------------------------------------------
# Terminal capability negotiation
# ------------------------------------------------------------

# Inside tmux, programs should see a tmux-aware terminal.
set -g default-terminal "tmux-256color"

# Truecolor passthrough.
# Required so Neovim colors like #F5E6D6 are not reduced to
# xterm-256 approximations such as #FFD7D7 or #FFD7AF.
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",wezterm:RGB"
set -as terminal-features ",tmux-256color:RGB"

# Fallback for older tmux versions.
set -as terminal-overrides ",xterm-256color:Tc"
set -as terminal-overrides ",wezterm:Tc"
set -as terminal-overrides ",tmux-256color:Tc"

# Enable italic text (SGR 3 / 23) in modern terminals.
set -ga terminal-overrides ',*:sitm=\E[3m'
set -ga terminal-overrides ',*:ritm=\E[23m'


# ------------------------------------------------------------
# Visual focus & accents
# ------------------------------------------------------------

# Pane borders
# Inactive: dark yellow / olive (low contrast)
set -g pane-border-style fg=colour58

# Active: bright yellow (focus)
set -g pane-active-border-style fg=yellow

# Cursor (active input indicator)
#set -g cursor-style fg=black,bg=yellow

# Status line (stable accent)
set -g status-style fg=yellow,bg=default


# ------------------------------------------------------------
# Input & interaction model
# ------------------------------------------------------------

set -g mode-keys vi
set -g mouse on
set-option -sg escape-time 10
set-option -g focus-events on


# ------------------------------------------------------------
# Clipboard (OSC 52 — explicit, portable)
# ------------------------------------------------------------

bind-key -T copy-mode-vi y \
  send -X copy-pipe-and-cancel "$HOME/dev/env/terminal/tmux/osc52-copy.sh"

# set-option -g set-clipboard on   # intentionally disabled


# ------------------------------------------------------------
# Window navigation
# ------------------------------------------------------------
# Keep standard tmux semantics:
#
#   prefix + n   next window
#   prefix + p   previous window
#   prefix + &   kill window
#
# Remove prefix+L as a window-switch binding if it exists, so h/j/k/l
# are conceptually reserved for pane movement.
unbind-key L


# ------------------------------------------------------------
# Pane creation
# ------------------------------------------------------------
# Keep standard tmux pane creation:
#
#   prefix + %   split left/right
#   prefix + "   split top/bottom
#   prefix + z   zoom current pane
#
# No custom split bindings are defined here. This keeps the tmux
# grammar close to the default interface.


# ------------------------------------------------------------
# Pane navigation
# ------------------------------------------------------------
# Windows use prefix+n / prefix+p.
# Panes use prefix+h/j/k/l.
#
# Avoid prefix-free Ctrl-h/j/k/l so terminal programs like fzf
# and nvim can own their normal keybindings.

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
